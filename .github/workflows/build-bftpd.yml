name: Build bftpd for Android

on:
  push:
    branches: [main]
    paths:
      - 'patches/**'
      - '.github/workflows/build-bftpd.yml'
  workflow_dispatch:
    inputs:
      bftpd_use_latest:
        description: 'Download latest bftpd release (ignores bftpd version)'
        type: boolean
        required: false
        default: true

      bftpd_version:
        description: 'bftpd version'
        required: false

      ndk_version:
        description: 'NDK version'
        required: false
        default: 'r26d'

env:
  BFTPD_USE_LATEST: ${{ github.event.inputs.bftpd_use_latest || 'true' }}
  BFTPD_VERSION: ${{ github.event.inputs.bftpd_version || '6.6' }}
  NDK_VERSION: ${{ github.event.inputs.ndk_version || 'r26d' }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi:
          - name: arm64-v8a
            triple: aarch64-linux-android
            api: 21
          - name: armeabi-v7a
            triple: armv7a-linux-androideabi
            api: 19
          - name: x86_64
            triple: x86_64-linux-android
            api: 21
          - name: x86
            triple: i686-linux-android
            api: 19

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── NDK ─────────────────────────────────────────────────────────────
      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: android-ndk-${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q -L \
            https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip
          rm android-ndk-${{ env.NDK_VERSION }}-linux.zip

      - name: Set NDK env
        run: |
          echo "TOOLCHAIN=$PWD/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64" \
            >> $GITHUB_ENV

      # ── bftpd source ──────────────────────────────────────────────────────
      - name: Resolve bftpd version
        run: |
          if [ "$BFTPD_USE_LATEST" = "true" ]; then
            FILE_PATH=$(curl -s "https://sourceforge.net/projects/bftpd/best_release.json" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['release']['filename'])")
            VERSION=$(echo "$FILE_PATH" | grep -oP 'bftpd-\K[\d.]+(?=\.tar\.gz)')
            TARBALL=$(basename "$FILE_PATH")
            URL="https://downloads.sourceforge.net/project/bftpd${FILE_PATH}"
            SRC_DIR=bftpd
          else
            VERSION=$BFTPD_VERSION
            TARBALL="bftpd-${VERSION}.tar.gz"
            URL="https://sourceforge.net/projects/bftpd/files/bftpd/${VERSION}/${TARBALL}/download"
            SRC_DIR="bftpd-${VERSION}"
          fi
          echo "RESOLVED_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TARBALL=${TARBALL}"           >> $GITHUB_ENV
          echo "DOWNLOAD_URL=${URL}"          >> $GITHUB_ENV
          echo "SRC_DIR=${SRC_DIR}"           >> $GITHUB_ENV

      # ── cache ─────────────────────────────────────────────────────────────
      - name: Cache bftpd source
        id: cache-src
        uses: actions/cache@v5
        with:
          path: ${{ env.SRC_DIR }}
          key: bftpd-src-${{ env.RESOLVED_VERSION }}

      # ── download ──────────────────────────────────────────────────────────
      - name: Download bftpd
        if: steps.cache-src.outputs.cache-hit != 'true'
        run: |
          wget -q -L "${{ env.DOWNLOAD_URL }}" -O "${{ env.TARBALL }}"
          tar xzf "${{ env.TARBALL }}"
          rm "${{ env.TARBALL }}"

      # ── patch ─────────────────────────────────────────────────────────────
      - name: Apply patches
        run: |
          cp -r ${{ env.SRC_DIR }} build-${{ matrix.abi.name }}
          cd build-${{ matrix.abi.name }}
          for p in $(ls $GITHUB_WORKSPACE/patches/*.patch | sort); do
            echo ">>> Applying: $(basename $p)"
            patch -p1 < "$p"
          done

      # ── build ──────────────────────────────────────────────────────────────
      - name: Build ${{ matrix.abi.name }}
        run: |
          TRIPLE=${{ matrix.abi.triple }}
          API=${{ matrix.abi.api }}
          CC=${{ env.TOOLCHAIN }}/bin/${TRIPLE}${API}-clang
          STRIP=${{ env.TOOLCHAIN }}/bin/llvm-strip

          cd build-${{ matrix.abi.name }}
          make clean
          CROSS_CC=$CC make -j$(nproc)

          file libbftpd.so | grep -q "shared object" \
            || { echo "ERROR: not a shared object"; exit 1; }

          # Strip debug symbols
          $STRIP --strip-unneeded libbftpd.so

          echo "--- Binary info ---"
          file libbftpd.so
          ls -lh libbftpd.so

          # Stage output
          mkdir -p $GITHUB_WORKSPACE/out/${{ matrix.abi.name }}
          cp libbftpd.so $GITHUB_WORKSPACE/out/${{ matrix.abi.name }}/

      # ── upload artifact ──────────────────────────────────────────────────
      - name: Upload ${{ matrix.abi.name }}
        uses: actions/upload-artifact@v7
        with:
          name: libbftpd-${{ matrix.abi.name }}
          path: out/${{ matrix.abi.name }}/libbftpd.so
          if-no-files-found: error

  # ── release ───────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries/
          # downloads to binaries/libbftpd-<abi>/libbftpd.so

      - name: Rename for release
        run: |
          mkdir release
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            src="binaries/libbftpd-${abi}/libbftpd.so"
            if [ -f "$src" ]; then
              cp "$src" "release/libbftpd-${abi}.so"
            fi
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bftpd-${{ env.RESOLVED_VERSION }}-${{ github.sha }}
          name: libbftpd.so ${{ env.RESOLVED_VERSION }} (${{ github.sha }})
          body: |
            Automatically built from bftpd ${{ env.RESOLVED_VERSION }} with Android JNI patches.

            ## Usage
            Drop each `.so` into `app/src/main/jniLibs/<abi>/libbftpd.so`,
            then call `System.loadLibrary("bftpd")` from your app,
            or load via `dlopen()` — the server starts automatically on load.
          files: release/*.so
