name: Build libbftpd.so for Android

on:
  push:
    branches: [main]
    paths:
      - 'patches/**'
      - '.github/workflows/build-bftpd.yml'
  workflow_dispatch:
    inputs:
      bftpd_BFTPD_USE_LATEST:
        description: 'Download latest bftpd release (ignores bftpd_version)'
        type: boolean
        required: false
        default: false
      bftpd_version:
        description: 'bftpd version (ignored when BFTPD_USE_LATEST=true)'
        required: false
        default: '6.6'
      ndk_version:
        description: 'ndk version'
        required: false
        default: 'r26d'

env:
  BFTPD_BFTPD_USE_LATEST: ${{ github.event.inputs.bftpd_BFTPD_USE_LATEST || 'false' }}
  BFTPD_VERSION: ${{ github.event.inputs.bftpd_version || '6.6' }}
  NDK_VERSION: ${{ github.event.inputs.ndk_version || 'r26d' }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi:
          - name: arm64-v8a
            triple: aarch64-linux-android
            api: 21
          - name: armeabi-v7a
            triple: armv7a-linux-androideabi
            api: 19
          - name: x86_64
            triple: x86_64-linux-android
            api: 21
          - name: x86
            triple: i686-linux-android
            api: 19

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── NDK ─────────────────────────────────────────────────────────────
      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: android-ndk-${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q -L \
            https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip
          rm android-ndk-${{ env.NDK_VERSION }}-linux.zip

      - name: Set NDK env
        run: |
          echo "TOOLCHAIN=$PWD/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64" \
            >> $GITHUB_ENV

      # ── bftpd source ──────────────────────────────────────────────────────
      - name: Download bftpd (latest)
        if: env.BFTPD_USE_LATEST == 'true'
        run: |
          # SourceForge latest/download redirects to the newest release tarball.
          # -L follows the chain of redirects; -O writes to a fixed filename.
          wget -q -L \
            https://sourceforge.net/projects/bftpd/files/latest/download \
            -O bftpd-latest.tar.gz

          # Extract and find the resulting directory name, then normalise it.
          tar xzf bftpd-latest.tar.gz
          rm bftpd-latest.tar.gz

          EXTRACTED=$(ls -d bftpd-* 2>/dev/null | head -1)
          echo "Extracted: $EXTRACTED"
          # Rename to a stable path so later steps don't need to know the version.
          mv "$EXTRACTED" bftpd-src
          echo "SRC_DIR=bftpd-src" >> $GITHUB_ENV

          # Parse version from directory name for the release tag.
          VERSION=${EXTRACTED#bftpd-}
          echo "RESOLVED_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Cache bftpd source (versioned)
        if: env.BFTPD_USE_LATEST != 'true'
        id: cache-src
        uses: actions/cache@v5
        with:
          path: bftpd-${{ env.BFTPD_VERSION }}
          key: bftpd-src-${{ env.BFTPD_VERSION }}

      - name: Download bftpd (versioned)
        if: env.BFTPD_USE_LATEST != 'true' && steps.cache-src.outputs.cache-hit != 'true'
        run: |
          # Append /download to get the direct file link, not the SF landing page.
          wget -q -L \
            https://sourceforge.net/projects/bftpd/files/bftpd/${{ env.BFTPD_VERSION }}/bftpd-${{ env.BFTPD_VERSION }}.tar.gz/download \
            -O bftpd-${{ env.BFTPD_VERSION }}.tar.gz
          tar xzf bftpd-${{ env.BFTPD_VERSION }}.tar.gz
          rm  bftpd-${{ env.BFTPD_VERSION }}.tar.gz

      - name: Set versioned source dir
        if: env.BFTPD_USE_LATEST != 'true'
        run: |
          echo "SRC_DIR=bftpd-${{ env.BFTPD_VERSION }}" >> $GITHUB_ENV
          echo "RESOLVED_VERSION=${{ env.BFTPD_VERSION }}" >> $GITHUB_ENV

      # ── patch ─────────────────────────────────────────────────────────────
      - name: Apply patches
        run: |
          cp -r ${{ env.SRC_DIR }} build-${{ matrix.abi.name }}
          cd build-${{ matrix.abi.name }}
          for p in $(ls $GITHUB_WORKSPACE/patches/*.patch | sort); do
            echo ">>> Applying: $(basename $p)"
            patch -p1 < "$p"
          done

      # ── build ──────────────────────────────────────────────────────────────
      - name: Build ${{ matrix.abi.name }}
        run: |
          TRIPLE=${{ matrix.abi.triple }}
          API=${{ matrix.abi.api }}
          CC=${{ env.TOOLCHAIN }}/bin/${TRIPLE}${API}-clang
          STRIP=${{ env.TOOLCHAIN }}/bin/llvm-strip

          cd build-${{ matrix.abi.name }}
          make clean
          CROSS_CC=$CC make -j$(nproc)

          file libbftpd.so | grep -q "shared object" \
            || { echo "ERROR: not a shared object"; exit 1; }

          # Strip debug symbols
          $STRIP --strip-unneeded libbftpd.so

          echo "--- Binary info ---"
          file libbftpd.so
          ls -lh libbftpd.so

          # Stage output
          mkdir -p $GITHUB_WORKSPACE/out/${{ matrix.abi.name }}
          cp libbftpd.so $GITHUB_WORKSPACE/out/${{ matrix.abi.name }}/

      # ── upload artifact ──────────────────────────────────────────────────
      - name: Upload ${{ matrix.abi.name }}
        uses: actions/upload-artifact@v7
        with:
          name: libbftpd-${{ matrix.abi.name }}
          path: out/${{ matrix.abi.name }}/libbftpd.so
          if-no-files-found: error

  # ── release ───────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries/
          # downloads to binaries/libbftpd-<abi>/libbftpd.so

      - name: Rename for release
        run: |
          mkdir release
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            src="binaries/libbftpd-${abi}/libbftpd.so"
            if [ -f "$src" ]; then
              cp "$src" "release/libbftpd-${abi}.so"
            fi
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bftpd-${{ env.RESOLVED_VERSION }}-${{ github.sha }}
          name: libbftpd.so ${{ env.RESOLVED_VERSION }} (${{ github.sha }})
          body: |
            Automatically built from bftpd ${{ env.RESOLVED_VERSION }} with Android JNI patches.

            ## Usage
            Drop each `.so` into `app/src/main/jniLibs/<abi>/libbftpd.so`,
            then call `System.loadLibrary("bftpd")` from your app,
            or load via `dlopen()` — the server starts automatically on load.
          files: release/*.so
